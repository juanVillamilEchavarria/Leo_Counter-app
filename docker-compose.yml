services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USER=juanvillamil
        - UID=1000
    container_name: leo_counter_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Código de la aplicación
      - .:/var/www/html

      #  VOLUMEN PARA ARCHIVOS SUBIDOS DE MOVIMIENTOS
      - movimientos_data:/var/www/html/storage/app/data/movimientos

      # Storage completo en volumen
      - app_storage:/var/www/html/storage

      #  LOGS en volumen separado
      - app_logs:/var/www/html/storage/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USER=juanvillamil
        - UID=1000
    image: leo_counter_app
    container_name: leo_counter_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - movimientos_data:/var/www/html/storage/app/data/movimientos
      - app_storage:/var/www/html/storage
      - app_logs:/var/www/html/storage/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:latest
    container_name: mariadb_server
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME}
      PMA_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web
    restart: unless-stopped
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USER=juanvillamil
        - UID=1000
    image: leo_counter_app
    container_name: leo_counter_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8085:8080"   # Mapea el puerto 8085 del host al 8080 del contenedor (donde escucha Reverb)
    volumes:
      - .:/var/www/html
      - movimientos_data:/var/www/html/storage/app/data/movimientos
      - app_storage:/var/www/html/storage
      - app_logs:/var/www/html/storage/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 256m
    mem_reservation: 128m

volumes:
  # Archivos de movimientos (PDFs, comprobantes)
  movimientos_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./storage/app/data/movimientos

  # Storage completo
  app_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./storage

  # Logs separados
  app_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./storage/logs

  # Base de datos
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../Leo_Counter_Docker/docker/mysql/data

networks:
  leo_network:
    driver: bridge
